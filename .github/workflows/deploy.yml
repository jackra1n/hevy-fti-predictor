name: Deploy Inference

on:
  workflow_run:
    workflows: ["Train Model"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    env:
      REGION: europe-west1
      SERVICE_NAME: hevy-fti-inference

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - run: pipx install 'dvc[gs]'

      - run: dvc pull data/processed.dvc

      - name: Build and deploy
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/hevy-fti-predictor/hevy-inference:latest"

          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE_URI=${IMAGE_URI}" \
            --project="${PROJECT_ID}"

          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --set-env-vars "DAGSHUB_TOKEN=${DAGSHUB_TOKEN},DAGSHUB_REPO_OWNER=${DAGSHUB_REPO_OWNER},DAGSHUB_REPO_NAME=${DAGSHUB_REPO_NAME}" \
            --allow-unauthenticated \
            --memory "1Gi" \
            --cpu "2" \
            --max-instances 1 \
            --project="${PROJECT_ID}"
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO_OWNER: ${{ vars.DAGSHUB_REPO_OWNER }}
          DAGSHUB_REPO_NAME: ${{ vars.DAGSHUB_REPO_NAME }}
