name: Train Model

on:
  workflow_run:
    workflows: ["Update Data"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  train:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'
          enable-cache: false

      - run: pipx install 'dvc[gs]'

      - run: dvc pull

      - run: docker build -t hevy-fti-predictor:train .

      - run: |
          docker run --rm \
            -e DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }} \
            -e DAGSHUB_REPO_OWNER=${{ vars.DAGSHUB_REPO_OWNER }} \
            -e DAGSHUB_REPO_NAME=${{ vars.DAGSHUB_REPO_NAME }} \
            -e GIT_COMMIT=${{ github.sha }} \
            hevy-fti-predictor:train
